    <div id="quiz">
      <h3>Какой язык работает в браузере?</h3>
    
      <button onclick="check('a')">Python</button>
      <button onclick="check('b')">JavaScript</button>
      <button onclick="check('c')">C++</button>
    
      <p id="result"></p>
    </div>
    
    <script>
    function check(answer) {
      const result = document.getElementById('result');
    
      if(answer === 'b') {
        result.innerText = 'Правильно!';
      } else {
        result.innerText = 'Неправильно';
      }
    }
    </script>
